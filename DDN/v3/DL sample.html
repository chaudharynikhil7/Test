<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Boundary Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/dynamsoft-capture-vision-bundle@3.2.5000/dist/dcv.bundle.js"></script>
    <style>
      :root {
        --bg-start: #eef5ff;
        --bg-end: #edfdf5;
        --panel: #ffffff;
        --text: #1f2a37;
        --muted: #5b6472;
        --primary: #0066d6;
        --primary-hover: #0053ae;
        --border: #dbe4ef;
        --shadow: 0 12px 28px rgba(18, 47, 89, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: linear-gradient(140deg, var(--bg-start), var(--bg-end));
        padding: 20px;
      }

      .app {
        max-width: 1050px;
        margin: 0 auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.5rem;
      }

      .subtitle {
        margin: 0 0 14px;
        color: var(--muted);
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button:disabled {
        background: #94a7bd;
        cursor: not-allowed;
      }

      #status {
        color: var(--muted);
        font-size: 0.95rem;
      }

      #liveChecks {
        margin-top: 8px;
        color: #24415f;
        font-size: 0.86rem;
        font-family: Consolas, "Courier New", monospace;
      }

      #cameraViewContainer {
        width: 100%;
        max-width: 900px;
        aspect-ratio: 16 / 10;
        min-height: 260px;
        position: relative;
        margin-top: 6px;
        display: none;
        border: 2px solid #9bb9de;
        border-radius: 12px;
        overflow: hidden;
        background: #f6f9ff;
      }

      #scanStepBadge {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 2;
        display: none;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(0, 40, 90, 0.82);
        color: #fff;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      #normalized-result {
        margin-top: 14px;
        display: none;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: #f9fbff;
      }

      #normalized-result p {
        margin: 0 0 8px;
        font-weight: 600;
      }

      #normalized-result h3 {
        margin: 12px 0 8px;
        font-size: 1rem;
      }

      #normalized-result canvas {
        max-width: 100%;
        height: auto;
        display: block;
      }

      #normalized-result pre {
        margin: 10px 0 0;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        max-height: 260px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.88rem;
      }
    </style>
  </head>

  <body>
    <main class="app">
      <h1>Detect the Boundary of the Document</h1>
      <p class="subtitle">The scanner waits for stable detections and stops after returning one normalized image.</p>

      <div class="toolbar">
        <button id="startButton" onclick="startDetection()">Start Detection</button>
        <span id="status">Ready</span>
      </div>
      <div id="liveChecks">Checks: idle</div>

      <div id="cameraViewContainer">
        <div id="scanStepBadge"></div>
      </div>
      <div id="normalized-result"></div>
    </main>

    <script>
      const cameraViewContainer = document.querySelector("#cameraViewContainer");
      const scanStepBadge = document.querySelector("#scanStepBadge");
      const startButton = document.querySelector("#startButton");
      const statusLabel = document.querySelector("#status");
      const liveChecksLabel = document.querySelector("#liveChecks");
      let router;
      let cameraEnhancer;
      let originalImageData = null;
      let frameCount = 0;
      let totalFramesSeen = 0;
      const REQUIRED_CONSECUTIVE_FRAMES = 1;
      let isProcessingResult = false;
      let scanStep = "front";
      let latestBarcodeData = null;
      let frontNormalizedCanvas = null;
      let backNormalizedCanvas = null;
      const CUSTOM_TEMPLATE_URL = "./template-agility.json";
      const DETECT_TEMPLATE_NAME = "DetectDriversLicense";
      const NORMALIZE_TEMPLATE_NAME = "NormalizeDriversLicense";

      const normalizedImageContainer = document.querySelector("#normalized-result");

      Dynamsoft.License.LicenseManager.initLicense(
        "DLS2eyJoYW5kc2hha2VDb2RlIjoiMTAwMTg0NTA5LVRYbFhaV0pRY205cSIsIm1haW5TZXJ2ZXJVUkwiOiJodHRwczovL21kbHMuZHluYW1zb2Z0b25saW5lLmNvbS8iLCJvcmdhbml6YXRpb25JRCI6IjEwMDE4NDUwOSIsInN0YW5kYnlTZXJ2ZXJVUkwiOiJodHRwczovL3NkbHMuZHluYW1zb2Z0b25saW5lLmNvbS8iLCJjaGVja0NvZGUiOjEzNDQxNjc1MDB9",
      );
      Dynamsoft.Core.CoreModule.loadWasm(["DDN", "DBR", "DCP"]);

      (async function () {
        try {
          router = await Dynamsoft.CVR.CaptureVisionRouter.createInstance();
          let view = await Dynamsoft.DCE.CameraView.createInstance();
          cameraEnhancer = await Dynamsoft.DCE.CameraEnhancer.createInstance(view);
          cameraViewContainer.append(view.getUIElement());
          router.setInput(cameraEnhancer);

          // In this SDK version, initializing from a JSON file path is more reliable
          // than passing a parsed object.
          await router.initSettings(CUSTOM_TEMPLATE_URL);

          // Match agility sample behavior: only accept verified quad results.
          const resultFilter = new Dynamsoft.Utility.MultiFrameResultCrossFilter();
          resultFilter.enableResultCrossVerification(
            Dynamsoft.Core.EnumCapturedResultItemType.CRIT_DETECTED_QUAD,
            true,
          );
          resultFilter.enableResultDeduplication(Dynamsoft.Core.EnumCapturedResultItemType.CRIT_DETECTED_QUAD, true);
          await router.addResultFilter(resultFilter);

          /* Defines the result receiver for the task.*/
          const resultReceiver = new Dynamsoft.CVR.CapturedResultReceiver();
          resultReceiver.onCapturedResultReceived = handleCapturedResult;
          router.addResultReceiver(resultReceiver);
          statusLabel.textContent = "Custom template loaded. Ready.";
        } catch (error) {
          console.error(error);
          statusLabel.textContent =
            "Failed to initialize custom templates. Serve this file over HTTP/HTTPS and verify template names.";
          startButton.disabled = true;
        }
      })();

      const stopDetectionUI = async () => {
        await router.stopCapturing();
        if (cameraEnhancer?.isOpen?.()) {
          await cameraEnhancer.close();
        }
        cameraViewContainer.style.display = "none";
        scanStepBadge.style.display = "none";
      };

      const updateScanStepBadge = () => {
        if (scanStep === "front") {
          scanStepBadge.textContent = "STEP 1/2 - FRONT";
        } else {
          scanStepBadge.textContent = "STEP 2/2 - BACK + PDF417";
        }
      };

      const updateLiveChecks = ({ hasQuad, quadVerified, hasBarcodeInThisFrame, hasBarcodeCached }) => {
        const canProceed = frameCount >= REQUIRED_CONSECUTIVE_FRAMES && (scanStep === "front" || hasBarcodeCached);
        liveChecksLabel.textContent =
          `Checks | step=${scanStep.toUpperCase()} | frame=${totalFramesSeen} | ` +
          `quad=${hasQuad ? "Y" : "N"} | quadVerified=${quadVerified ? "Y" : "N"} | ` +
          `barcodeInFrame=${hasBarcodeInThisFrame ? "Y" : "N"} | barcodeCaptured=${hasBarcodeCached ? "Y" : "N"} | ` +
          `ready=${canProceed ? "Y" : "N"}`;
      };

      async function startDetection() {
        if (!router || !cameraEnhancer) {
          statusLabel.textContent = "Initializing scanner...";
          return;
        }

        scanStep = "front";
        frameCount = 0;
        totalFramesSeen = 0;
        isProcessingResult = false;
        latestBarcodeData = null;
        frontNormalizedCanvas = null;
        backNormalizedCanvas = null;
        normalizedImageContainer.style.display = "none";
        normalizedImageContainer.innerHTML = "";

        startButton.disabled = true;
        statusLabel.textContent = "Opening camera...";
        cameraViewContainer.style.display = "block";
        scanStepBadge.style.display = "inline-block";
        updateScanStepBadge();
        liveChecksLabel.textContent = "Checks: camera started";
        await cameraEnhancer.open();
        await cameraEnhancer.setPixelFormat(Dynamsoft.Core.EnumImagePixelFormat.IPF_ARGB_8888);
        await router.startCapturing(DETECT_TEMPLATE_NAME);
        statusLabel.textContent = "Step 1/2: Capture FRONT of license.";
      }

      const renderFinalResult = () => {
        normalizedImageContainer.innerHTML = "";
        normalizedImageContainer.style.display = "block";

        const frontTitle = document.createElement("h3");
        frontTitle.textContent = "Front (normalized)";
        normalizedImageContainer.append(frontTitle);
        if (frontNormalizedCanvas) {
          normalizedImageContainer.append(frontNormalizedCanvas);
        }

        const backTitle = document.createElement("h3");
        backTitle.textContent = "Back (normalized)";
        normalizedImageContainer.append(backTitle);
        if (backNormalizedCanvas) {
          normalizedImageContainer.append(backNormalizedCanvas);
        }

        if (latestBarcodeData) {
          const barcodeTitle = document.createElement("h3");
          barcodeTitle.textContent = "Back PDF417 barcode text";
          normalizedImageContainer.append(barcodeTitle);

          const barcodeRaw = document.createElement("pre");
          barcodeRaw.textContent = latestBarcodeData.rawText;
          normalizedImageContainer.append(barcodeRaw);

          if (latestBarcodeData.parsedJson) {
            const parsedTitle = document.createElement("h3");
            parsedTitle.textContent = "Parsed barcode payload";
            normalizedImageContainer.append(parsedTitle);

            const parsedPayload = document.createElement("pre");
            parsedPayload.textContent = latestBarcodeData.parsedJson;
            normalizedImageContainer.append(parsedPayload);
          }
        }
      };

      const getBarcodeDataFromResult = (result) => {
        const parsedItem = result?.parsedResult?.parsedResultItems?.[0];
        const barcodeItem = result?.barcodeResult?.barcodeResultItems?.[0];

        const rawText = parsedItem?.referencedItem?.text || barcodeItem?.text || "";
        if (!rawText) {
          return null;
        }

        let parsedJson = "";
        if (parsedItem?.jsonString) {
          try {
            parsedJson = JSON.stringify(JSON.parse(parsedItem.jsonString), null, 2);
          } catch (error) {
            parsedJson = parsedItem.jsonString;
          }
        }

        return {
          rawText,
          parsedJson,
        };
      };

      async function handleCapturedResult(result) {
        if (isProcessingResult) {
          return;
        }

        totalFramesSeen++;

        const barcodeDataInFrame = getBarcodeDataFromResult(result);
        if (barcodeDataInFrame) {
          latestBarcodeData = barcodeDataInFrame;
        }
        const hasBarcodeCached = !!latestBarcodeData;
        const hasBarcodeInThisFrame = !!barcodeDataInFrame;

        // console.log(result);
        /* Saves the image data of the current frame for subsequent image editing. */
        const originalImage = result.items.filter(
          (item) => item.type === Dynamsoft.Core.EnumCapturedResultItemType.CRIT_ORIGINAL_IMAGE,
        );
        originalImageData = originalImage.length && originalImage[0].imageData;

        const detectedQuadCandidates = [...(result?.processedDocumentResult?.detectedQuadResultItems || [])].sort(
          (a, b) => (b.location?.area || 0) - (a.location?.area || 0),
        );
        const detectedQuadItem = detectedQuadCandidates[0];
        const hasQuad = !!detectedQuadItem;
        const quadVerified =
          hasQuad && detectedQuadItem.crossVerificationStatus === Dynamsoft.Core.EnumCrossVerificationStatus.CVS_PASSED;

        if (quadVerified) {
          frameCount++;
        } else {
          frameCount = 0;
        }

        updateLiveChecks({
          hasQuad,
          quadVerified,
          hasBarcodeInThisFrame,
          hasBarcodeCached,
        });

        if (!detectedQuadItem) {
          if (scanStep === "back") {
            statusLabel.textContent = hasBarcodeCached
              ? "PDF417 found. Waiting for card border on back side..."
              : "Waiting for both back card border and PDF417 barcode...";
          } else {
            statusLabel.textContent = "Waiting for front card border...";
          }
          return;
        }

        if (frameCount < REQUIRED_CONSECUTIVE_FRAMES) {
          statusLabel.textContent = `Stabilizing detection: ${frameCount}/${REQUIRED_CONSECUTIVE_FRAMES}`;
          return;
        }

        if (scanStep === "back" && !hasBarcodeCached) {
          statusLabel.textContent = "Card border found. Waiting for PDF417 barcode read on back side...";
          return;
        }

        frameCount = 0;
        isProcessingResult = true;
        statusLabel.textContent =
          scanStep === "front" ? "Normalizing FRONT image..." : "Step 2/2: Normalizing BACK image...";
        try {
          const quadPoints = detectedQuadItem.location.points;
          console.log("result", result);
          console.log("detected quad is this", quadPoints);
          let normalizedResult = await performNormalization(quadPoints);

          const normalizedItem = normalizedResult?.items?.[0];
          if (!normalizedItem) {
            throw new Error("No normalized image was returned.");
          }

          if (scanStep === "front") {
            frontNormalizedCanvas = normalizedItem.toCanvas();
            latestBarcodeData = null;
            scanStep = "back";
            updateScanStepBadge();
            statusLabel.textContent = "Front captured. Step 2/2: Capture BACK with PDF417 barcode.";
            return;
          }

          backNormalizedCanvas = normalizedItem.toCanvas();

          renderFinalResult();

          await stopDetectionUI();
          statusLabel.textContent = "Done. Captured front + back images and back barcode data.";
          startButton.disabled = false;
          startButton.textContent = "Scan Again";
        } catch (error) {
          console.error(error);
          statusLabel.textContent = "Normalization failed. Please try again.";
          startButton.disabled = false;
        } finally {
          isProcessingResult = false;
        }
      }

      const performNormalization = async (newPoints) => {
        if (!originalImageData) {
          throw new Error("Original image data is not available for normalization.");
        }

        let settings = await router.getSimplifiedSettings(NORMALIZE_TEMPLATE_NAME);
        settings.roiMeasuredInPercentage = 0;
        settings.roi.points = newPoints;
        await router.updateSettings(NORMALIZE_TEMPLATE_NAME, settings);

        let normalizeResult = await router.capture(originalImageData, NORMALIZE_TEMPLATE_NAME);

        return normalizeResult;
      };
    </script>
  </body>
</html>
